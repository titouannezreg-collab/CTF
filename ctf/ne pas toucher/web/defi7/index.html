<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL_ACCESS</title>
    <link rel="stylesheet" href="style.css">
    <!-- Système de chiffrement v2.1 — architecture: XOR/rotating-key -->
    <!-- maintenance: contacter sys@neon-corp.int -->
</head>
<body data-build="v4.2" data-env="prod" data-cipher-key="NEON_K3Y" data-status="locked">
    <div class="scanline"></div>
    <div class="terminal">
        <header>
            <span class="system-label">TERMINAL V4.2 - ENCRYPTED</span>
            <span class="status-blink">REC_ON</span>
        </header>

        <div id="output">
            SYSTEM_READY. VEUILLEZ SAISIR LA CLÉ :<br><br>
            LE TERMINAL EST CHIFFRÉ. LA CLÉ EST QUELQUE PART.<br>
            BONNE CHANCE :)
        </div>

        <div class="input-line">
            <span class="prompt">GUEST@NEON:~$</span>
            <input type="text" id="inputField" autofocus autocomplete="off" spellcheck="false" placeholder="ENTREZ LA CLÉ...">
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
